experiment:
  name: baseline_resnet18
  output_dir: reports
  random_seed: 42

data:
  subset_config: configs/subset_rxrx1.yaml
  batch_size: 32
  num_workers: 4

model:
  encoder: resnet18
  pretrained: true
  embedding_dim: 512
  num_input_channels: 6

training:
  epochs: 15
  learning_rate: 0.0001
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine

evaluation:
  top_k: [1, 5]
  retrieval_k: [1, 5, 10]
